<script>// ==================== MIXED CHALLENGE 1 — STUDENT RESULT & ELIGIBILITY ====================

let obtainedMarks = 72;
let passingMarks = 40;
let attendance = 85;
let requiredAttendance = 75;

// 1. Check if the student has passed.
console.log("Passed:", obtainedMarks >= passingMarks);

// 2. Check if attendance meets the requirement.
console.log("Attendance Requirement:", attendance >= requiredAttendance);

// 3. Check if the student can sit in the final exam.
console.log("Eligible for Final Exam:", obtainedMarks >= passingMarks && attendance >= requiredAttendance);

// 4. Check if the student qualifies for a scholarship.
console.log("Scholarship:", obtainedMarks > 70 || attendance > 90);

// 5. Compare attendance and requiredAttendance using >=.
console.log("Attendance >= Required:", attendance >= requiredAttendance);

// 6. Check if obtainedMarks is strictly equal to passingMarks.
console.log("Marks === Passing Marks:", obtainedMarks === passingMarks);


// ===========================================================================================

// ==================== MIXED CHALLENGE 2 — ONLINE SHOPPING WEBSITE ====================

let cartTotal = 5500;
let minimumOrder = 3000;
let walletBalance = 4000;
let premiumMember = true;

// 1.
console.log("Minimum Order:", cartTotal >= minimumOrder);

// 2.
console.log("Enough Balance:", walletBalance >= cartTotal);

// 3.
console.log("Order Can Be Placed:", cartTotal >= minimumOrder && walletBalance >= cartTotal);

// 4.
console.log("Free Delivery:", premiumMember || cartTotal > 5000);

// 5.
console.log("Wallet >= Cart:", walletBalance >= cartTotal);

// 6.
console.log("Premium Member:", premiumMember === true);


// =====================================================================================

// ==================== MIXED CHALLENGE 3 — GAMING PLATFORM ====================

let playerLevel = 18;
let requiredLevel = 15;
let coins = 1800;
let requiredCoins = 2000;
let premiumPass = true;

// 1.
console.log("Level Requirement:", playerLevel >= requiredLevel);

// 2.
console.log("Enough Coins:", coins >= requiredCoins);

// 3.
console.log("Unlock Mission:", playerLevel >= requiredLevel && coins >= requiredCoins);

// 4.
console.log("VIP Content:", premiumPass || playerLevel > 20);

// 5.
console.log("Required Coins <= Coins:", requiredCoins <= coins);

// 6.
console.log("Premium Pass != false:", premiumPass !== false);


// ==============================================================================

// ==================== MIXED CHALLENGE 4 — BANK ACCOUNT VERIFICATION ====================

let accountBalance = 50000;
let withdrawalAmount = 15000;
let pinVerified = true;
let dailyLimit = 20000;

// 1.
console.log("Within Daily Limit:", withdrawalAmount <= dailyLimit);

// 2.
console.log("Enough Balance:", accountBalance >= withdrawalAmount);

// 3.
console.log("Withdrawal Approved:", pinVerified && accountBalance >= withdrawalAmount);

// 4.
console.log("Special Withdrawal:", accountBalance > 100000 || pinVerified);

// 5.
console.log("Withdrawal <= Daily Limit:", withdrawalAmount <= dailyLimit);

// 6.
console.log("PIN Verified:", pinVerified === true);


// =======================================================================================

// ==================== MIXED CHALLENGE 5 — EVENT REGISTRATION SYSTEM ====================

let age = 19;
let minimumAge = 18;
let registeredParticipants = 480;
let maximumParticipants = 500;
let vipInvite = false;

// 1.
console.log("Age Requirement:", age >= minimumAge);

// 2.
console.log("Seats Available:", registeredParticipants < maximumParticipants);

// 3.
console.log("Can Register:", age >= minimumAge && registeredParticipants < maximumParticipants);

// 4.
console.log("VIP Area:", vipInvite || age > 25);

// 5.
console.log("Participants < Maximum:", registeredParticipants < maximumParticipants);

// 6.
console.log("VIP Invite !== true:", vipInvite !== true);


// =======================================================================================

// ==================== MIXED CHALLENGE 6 — JOB APPLICATION PORTAL ====================

let experience = 3;
let requiredExperience = 2;
let degreeCompleted = true;
let referralAvailable = false;

// 1.
console.log("Enough Experience:", experience >= requiredExperience);

// 2.
console.log("Degree Completed:", degreeCompleted);

// 3.
console.log("Eligible for Interview:", experience >= requiredExperience && degreeCompleted);

// 4.
console.log("Priority Consideration:", degreeCompleted || referralAvailable);

// 5.
console.log("Experience >= Required:", experience >= requiredExperience);

// 6.
console.log("Referral Available:", referralAvailable == true);


// ====================================================================================

// ==================== MIXED CHALLENGE 7 — UNIVERSITY ADMISSION ====================

let testScore = 82;
let requiredScore = 75;
let documentsSubmitted = true;
let sportsQuota = false;

// 1.
console.log("Score Requirement:", testScore >= requiredScore);

// 2.
console.log("Documents Submitted:", documentsSubmitted);

// 3.
console.log("Admission Granted:", testScore >= requiredScore && documentsSubmitted);

// 4.
console.log("Alternative Admission:", sportsQuota || testScore > 90);

// 5.
console.log("Score >= Required:", testScore >= requiredScore);

// 6.
console.log("Sports Quota === false:", sportsQuota === false);</script>
